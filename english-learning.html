<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PDF 英語学習</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js" crossorigin="anonymous"></script>
<style>
/* ── THEMES ── */
:root {
  --bg:#0a0a0a; --surf:#141414; --surf2:#1c1c1c; --surf3:#242424;
  --bdr:#2e2e2e; --txt:#f0f0f0; --dim:#909090; --muted:#505050;
  --acc:#4a9eff; --acc-h:#6abfff; --acc-s:rgba(74,158,255,.14);
  --grn:#4affa0; --yel:#ffd84a; --red:#ff4a6a;
  --popup-shadow:0 12px 60px rgba(0,0,0,.7);
}
[data-theme="navy"]   { --bg:#06101e; --surf:#0b1a30; --surf2:#102240; --surf3:#152a50; --bdr:#1a3060; }
[data-theme="forest"] { --bg:#060e08; --surf:#0a1a0c; --surf2:#0e2212; --surf3:#122a16; --bdr:#183820; }
[data-theme="purple"] { --bg:#0c0610; --surf:#150a1e; --surf2:#1c1028; --surf3:#231632; --bdr:#301a48; }
[data-theme="slate"]  { --bg:#161618; --surf:#1e1e22; --surf2:#26262c; --surf3:#2e2e36; --bdr:#3c3c46; }

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}

/* ── HEADER ── */
.hdr{height:54px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;z-index:200;position:relative}
.logo{font-size:17px;font-weight:700;letter-spacing:-.5px;color:var(--acc);flex-shrink:0;white-space:nowrap}
.logo em{color:var(--txt);font-style:normal;font-weight:300}
.hdr-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
.mode-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);border-radius:7px;padding:5px 14px;cursor:pointer;font-size:11px;letter-spacing:.06em;transition:all .15s;white-space:nowrap}
.mode-btn.on{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 2px 12px rgba(74,158,255,.3)}
.mode-btn:hover:not(.on){border-color:var(--acc);color:var(--acc)}
.hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.theme-row{display:flex;align-items:center;gap:5px}
.theme-lbl{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
.th-dot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
.th-dot.on{border-color:var(--txt)}
.th-dot:hover:not(.on){border-color:var(--dim)}
.vbadge{font-size:11px;color:var(--dim);background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:3px 11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.vbadge:hover{border-color:var(--acc);color:var(--acc)}

/* ── LAYOUT ── */
.wrap{display:flex;height:calc(100vh - 54px);overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:274px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-sec{padding:13px 15px;border-bottom:1px solid var(--bdr)}
.sec-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}

/* upload */
.upload-box{border:1px dashed var(--bdr);border-radius:9px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .18s;background:var(--surf2)}
.upload-box:hover,.upload-box.drag{border-color:var(--acc);background:var(--acc-s)}
.upload-box input{display:none}
.u-icon{font-size:26px;margin-bottom:5px}
.u-txt{font-size:11.5px;color:var(--dim);line-height:1.7}
.u-txt strong{color:var(--acc);font-weight:500}
.f-info{display:none;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:8px 11px;font-size:11.5px;align-items:center;gap:7px;margin-top:8px}
.f-info.on{display:flex}
.f-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.f-pages{color:var(--muted);flex-shrink:0}
.f-reup{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 3px;border-radius:3px;line-height:1;flex-shrink:0;transition:color .12s}
.f-reup:hover{color:var(--acc)}

/* page nav */
.pg-row{display:flex;align-items:center;gap:5px}
.pg-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0}
.pg-btn:hover:not(:disabled){border-color:var(--acc);color:var(--acc)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
.pg-disp{flex:1;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;height:30px;display:flex;align-items:center;justify-content:center;font-size:11.5px;color:var(--dim)}

/* zoom */
.zm-row{display:flex;align-items:center;gap:5px;margin-top:7px}
.zm-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s}
.zm-btn:hover{border-color:var(--acc);color:var(--acc)}
.zm-val{font-size:11px;color:var(--muted);min-width:38px;text-align:center}

/* vocab list */
.vlist-wrap{flex:1;overflow-y:auto;padding:10px 14px}
.vlist-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.v-clear{font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline}
.v-clear:hover{color:var(--red)}
.v-empty{font-size:11.5px;color:var(--muted);text-align:center;padding:18px 0;line-height:1.8}
.v-item{background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.v-item:hover{border-color:var(--acc)}
.v-word{font-size:12.5px;font-weight:600;color:var(--acc)}
.v-phon{font-size:10px;color:var(--muted);margin-top:1px;font-style:italic}
.v-pos{display:inline-block;font-size:9px;background:var(--surf3);color:var(--muted);border-radius:3px;padding:1px 5px;margin-top:2px}
.v-def{font-size:11px;color:var(--dim);margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg)}

/* empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted)}
.empty.gone{display:none}
.e-ico{font-size:52px;opacity:.12}
.e-ttl{font-size:15px;color:var(--dim)}
.e-sub{font-size:12px;line-height:1.9;text-align:center}

/* loading */
.loading{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;color:var(--dim);font-size:13px}
.loading.on{display:flex}
.spin{width:30px;height:30px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PDF view */
.pdf-view{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:24px;background:var(--bg)}
.pdf-view.gone{display:none}
.pdf-wrap{position:relative;display:inline-block;box-shadow:0 4px 40px rgba(0,0,0,.5);flex-shrink:0}
#pdfCanvas{display:block}

/* text layer — matches PDF.js expected structure */
#txtLayer{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:auto;user-select:text;line-height:1;text-align:initial}
#txtLayer span{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0% 0%}
#txtLayer span::selection{background:rgba(74,158,255,.28);color:transparent}
#txtLayer br{display:none}

/* text mode */
.txt-view{flex:1;overflow-y:auto;padding:32px 48px;display:none}
.txt-view.on{display:block}
.pg-lbl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding-bottom:7px;margin:22px 0 10px;border-bottom:1px solid var(--bdr)}
.pg-lbl:first-child{margin-top:0}
.txt-body{font-size:16px;line-height:2.1;color:var(--dim);font-family:'Georgia','Times New Roman',serif}
.tok{cursor:pointer;border-radius:3px;padding:1px 1px;transition:background .12s,color .12s;display:inline}
.tok:hover{background:var(--acc-s);color:var(--txt)}
.tok.saved{color:var(--acc)}
.no-txt{font-size:11.5px;color:var(--muted);padding:6px 0}

/* ── QUIZ VIEW ── */
.quiz-view{flex:1;overflow-y:auto;display:none;flex-direction:column;align-items:center;padding:18px 16px 14px;gap:11px}
.quiz-view.on{display:flex}
#quizInner{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:stretch;gap:11px}
/* progress dots */
.qprog-wrap{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.qprog-dot{display:flex;flex-direction:column;align-items:center;font-size:11px;color:var(--muted);background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:3px 7px;cursor:pointer;min-width:30px;transition:all .12s;line-height:1.4;user-select:none}
.qprog-dot:hover{border-color:var(--acc)}
.qprog-dot.qprog-cur{border-color:var(--acc);color:var(--acc);font-weight:700}
.qprog-dot.qprog-ans{background:var(--acc-s);border-color:var(--acc);color:var(--acc)}
.qprog-dot.qprog-ok{background:rgba(74,255,160,.1);border-color:var(--grn);color:var(--grn)}
.qprog-dot.qprog-ng{background:rgba(255,74,106,.07);border-color:var(--red);color:var(--red)}
.qprog-sub{font-size:9px;line-height:1}
/* question */
.quiz-q-area{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:20px 22px;text-align:center}
.quiz-q-num{display:flex;align-items:center;justify-content:center;gap:10px;font-size:12px;color:var(--muted);margin-bottom:8px}
.quiz-q-result{font-size:30px;font-weight:900;line-height:1;color:var(--red)}
.quiz-q-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.quiz-q-word{font-size:34px;font-weight:700;color:var(--acc);letter-spacing:-.5px;line-height:1.1}
.quiz-q-phon{font-size:12px;color:var(--muted);margin-top:5px;font-style:italic}
/* choices */
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.choice-btn{position:relative;background:var(--surf);border:2px solid var(--bdr);color:var(--txt);border-radius:10px;padding:12px 36px 12px 12px;cursor:pointer;font-size:12.5px;line-height:1.5;text-align:left;transition:all .15s;min-height:60px;width:100%;word-break:break-word}
.choice-btn:hover:not(:disabled):not(.selected):not(.correct):not(.wrong){border-color:var(--acc);background:var(--acc-s)}
.choice-btn.selected{border-color:var(--acc);background:var(--acc-s)}
.choice-btn.correct{border-color:var(--grn)!important;background:rgba(74,255,160,.09)}
.choice-btn.wrong{border-color:var(--red)!important;background:rgba(255,74,106,.07)}
.choice-btn:disabled{cursor:default}
.choice-mark{position:absolute;top:50%;right:8px;transform:translateY(-50%);font-size:22px;font-weight:900;line-height:1;color:var(--red)}
/* bottom controls */
.quiz-bottom{display:flex;flex-direction:column;align-items:stretch;gap:9px}
.quiz-nav{display:flex;align-items:center;gap:9px}
.quiz-nav-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);border-radius:7px;width:38px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;transition:all .15s}
.quiz-nav-btn:hover:not(:disabled){border-color:var(--acc);color:var(--acc)}
.quiz-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.quiz-nav-cnt{flex:1;text-align:center;font-size:11.5px;color:var(--muted)}
.quiz-check-btn{background:var(--acc);border:none;color:#fff;border-radius:9px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;letter-spacing:.04em}
.quiz-check-btn:hover{opacity:.88}
.quiz-check-btn.off{opacity:.3;pointer-events:none}
.quiz-restart-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);border-radius:9px;padding:11px;font-size:13px;cursor:pointer;transition:all .15s;text-align:center}
.quiz-restart-btn:hover{border-color:var(--acc);color:var(--acc)}
/* score */
.quiz-score-row{text-align:center;font-size:26px;font-weight:700;color:var(--acc);padding:4px 0}
.quiz-score-sub{font-size:11.5px;color:var(--muted);text-align:center}
/* empty */
.quiz-empty{text-align:center;color:var(--muted);font-size:13px;line-height:2.2;padding:40px 20px}
/* PDF sentence question */
.quiz-q-sentence{font-size:15px;font-weight:400;line-height:2.1;color:var(--txt);text-align:left;word-break:break-word}
.quiz-blank{display:inline-block;min-width:52px;border-bottom:2.5px solid var(--acc);margin:0 3px;vertical-align:baseline}
/* settings modal */
.hdr-icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 7px;border-radius:5px;transition:color .12s;flex-shrink:0}
.hdr-icon-btn:hover{color:var(--acc)}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;display:none;align-items:center;justify-content:center;padding:16px}
.settings-overlay.on{display:flex}
.settings-box{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:22px 24px;width:340px;max-width:100%}
.settings-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:18px}
.settings-lbl{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.settings-input{width:100%;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:7px;padding:9px 12px;font-size:12px;font-family:monospace;outline:none;transition:border-color .15s}
.settings-input:focus{border-color:var(--acc)}
.settings-note{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.7}
.settings-note a{color:var(--acc)}
.settings-actions{display:flex;gap:8px;margin-top:16px}
.settings-save{flex:1;background:var(--acc);border:none;color:#fff;border-radius:7px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.settings-save:hover{opacity:.88}
.settings-cancel{background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);border-radius:7px;padding:9px 14px;font-size:13px;cursor:pointer;transition:all .15s}
.settings-cancel:hover{border-color:var(--acc);color:var(--acc)}
.settings-status{font-size:11px;margin-top:10px;padding:7px 10px;border-radius:6px;display:none}
.settings-status.ok{display:block;background:rgba(74,255,160,.1);color:var(--grn);border:1px solid var(--grn)}
.settings-status.ng{display:block;background:rgba(255,74,106,.08);color:var(--red);border:1px solid var(--red)}

/* status bar */
.sbar{height:30px;background:var(--surf);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:8px;font-size:10.5px;color:var(--muted);flex-shrink:0}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sdot.ok{background:var(--grn);box-shadow:0 0 5px var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── POPUP ── */
.popup{position:fixed;z-index:1000;background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:17px 19px 14px;width:320px;max-width:calc(100vw - 24px);max-height:72vh;overflow-y:auto;box-shadow:var(--popup-shadow);display:none;animation:popIn .14s ease-out}
.popup.on{display:block}
@keyframes popIn{from{opacity:0;transform:translateY(-7px) scale(.97)}to{opacity:1;transform:none}}
.pop-close{position:absolute;top:11px;right:13px;width:22px;height:22px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;border-radius:4px;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .12s}
.pop-close:hover{background:var(--surf2);color:var(--txt)}
.pop-word{font-size:24px;font-weight:700;color:var(--acc);line-height:1.1;padding-right:24px}
.pop-phon{font-size:11.5px;color:var(--muted);margin-top:2px;font-style:italic}
.pop-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:10px 0}
.pop-pos{display:inline-block;font-size:9.5px;background:var(--acc-s);color:var(--acc);border-radius:4px;padding:2px 7px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 5px}
.pop-def{font-size:12.5px;color:var(--dim);line-height:1.75;margin-bottom:5px}
.pop-ex{font-size:11px;color:var(--muted);font-style:italic;padding-left:9px;border-left:2px solid var(--bdr);margin-bottom:7px;line-height:1.6}
.pop-syn{font-size:10.5px;color:var(--muted);margin-bottom:5px}
.pop-syn strong{color:var(--grn)}
.pop-div{height:1px;background:var(--bdr);margin:9px 0}
.pop-404{font-size:12.5px;color:var(--muted);text-align:center;padding:12px 0}
.pop-actions{display:flex;gap:6px;margin-top:11px}
.pop-btn{flex:1;background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);border-radius:7px;padding:7px 6px;cursor:pointer;font-size:11px;letter-spacing:.04em;transition:all .15s;text-align:center;white-space:nowrap}
.pop-btn:hover{border-color:var(--acc);color:var(--acc)}
.pop-btn.pri{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:500}
.pop-btn.pri:hover{opacity:.88}
.pop-btn.done{background:var(--grn);border-color:var(--grn);color:#000;font-weight:500}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:8px 18px;font-size:12.5px;color:var(--txt);z-index:9999;transition:transform .22s;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.on{transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .sidebar{width:220px}
  .hdr-mid,.theme-lbl{display:none}
  .txt-view{padding:18px 20px}
}
@media(max-width:480px){
  .sidebar{display:none}
  .pdf-view{padding:10px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">PDF<em>英語学習</em></div>

  <div class="hdr-mid">
    <button class="mode-btn on" id="btnPDF">📄 PDF表示</button>
    <button class="mode-btn" id="btnTxt">📝 テキスト</button>
    <button class="mode-btn" id="btnQuiz">🎯 クイズ</button>
  </div>

  <div class="hdr-right">
    <div class="theme-row">
      <span class="theme-lbl">BG</span>
      <div class="th-dot on" data-theme="" style="background:#0a0a0a" title="Black"></div>
      <div class="th-dot" data-theme="navy" style="background:#06101e" title="Navy"></div>
      <div class="th-dot" data-theme="forest" style="background:#060e08" title="Forest"></div>
      <div class="th-dot" data-theme="purple" style="background:#0c0610" title="Purple"></div>
      <div class="th-dot" data-theme="slate" style="background:#161618" title="Slate"></div>
    </div>
    <button class="hdr-icon-btn" id="btnSettings" title="設定">⚙</button>
    <div class="vbadge" id="vbadge">単語帳 0</div>
  </div>
</header>

<!-- SETTINGS MODAL -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box">
    <div class="settings-title">⚙ 設定</div>
    <div class="settings-lbl">Gemini API Key</div>
    <input type="password" class="settings-input" id="geminiKeyInput" placeholder="AIzaSy...">
    <div class="settings-note">
      Google AI Studio で無料取得 →
      <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com</a><br>
      キーはこのデバイスにのみ保存されます。PDFロード時に自動で問題を解析します。
    </div>
    <div class="settings-status" id="settingsStatus"></div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

/* ── PDF.js setup ── */
var VER = '3.11.174';
if(typeof pdfjsLib !== 'undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@'+VER+'/legacy/build/pdf.worker.min.js';
}

/* ── State ── */
var pdfDoc     = null;
var curPage    = 1;
var totalPg    = 0;
var scale      = 1.2;
var allText    = {};
/* FIX: wrap JSON.parse in try-catch — corrupted localStorage must not crash the app */
var vocab = (function(){
  try{ return JSON.parse(localStorage.getItem('eng_vocab')||'[]'); }
  catch(e){ return []; }
})();
var viewMode   = 'pdf';
var popupOpenTs = 0;
var canvasRenderTask = null; /* FIX: track active canvas render for cancellation */
var isLoading  = false;     /* FIX: prevent double-load */
var pdfProblems = [];
var geminiKey   = (function(){ try{ return localStorage.getItem('gemini_key')||''; }catch(e){ return ''; } })();

/* ── Utils ── */
function G(id){ return document.getElementById(id); }
var toastTid;
function toast(m){
  var el=G('toast'); el.textContent=m; el.classList.add('on');
  clearTimeout(toastTid); toastTid=setTimeout(function(){el.classList.remove('on');},2600);
}
function setStatus(m,ok){
  G('stext').textContent=m;
  G('sdot').classList.toggle('ok',!!ok);
}
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
/* FIX: Strip possessive 's and trailing punctuation before dictionary lookup */
function normalizeWord(w){
  return w.toLowerCase().replace(/'s$/i,'').replace(/[^a-z]/g,'');
}

/* ── Theme ── */
document.querySelectorAll('.th-dot').forEach(function(d){
  d.addEventListener('click',function(){
    document.querySelectorAll('.th-dot').forEach(function(x){x.classList.remove('on');});
    d.classList.add('on');
    document.body.dataset.theme = d.dataset.theme;
    localStorage.setItem('eng_theme', d.dataset.theme);
  });
});
(function(){
  var t = localStorage.getItem('eng_theme')||'';
  document.body.dataset.theme = t;
  var d = document.querySelector('.th-dot[data-theme="'+t+'"]');
  if(d){
    document.querySelectorAll('.th-dot').forEach(function(x){x.classList.remove('on');});
    d.classList.add('on');
  }
})();

/* ── Upload ── */
var upBox    = G('upBox');
var pdfInput = G('pdfInput');

upBox.addEventListener('click', function(){ pdfInput.click(); });

/* FIX: Re-upload button lets user open another PDF after first is loaded */
G('btnReup').addEventListener('click', function(){ pdfInput.click(); });

pdfInput.addEventListener('change', function(){
  if(pdfInput.files[0]) loadPDF(pdfInput.files[0]);
  pdfInput.value='';
});

upBox.addEventListener('dragover', function(e){ e.preventDefault(); upBox.classList.add('drag'); });
upBox.addEventListener('dragleave', function(){ upBox.classList.remove('drag'); });
upBox.addEventListener('drop', function(e){
  e.preventDefault();
  e.stopPropagation(); /* FIX: prevent document-level drop from also firing loadPDF */
  upBox.classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if(f && f.type==='application/pdf') loadPDF(f);
  else toast('⚠ PDFファイルを選択してください');
});

/* Document-level drop (for dropping outside the upload box) */
document.addEventListener('dragover', function(e){ e.preventDefault(); });
document.addEventListener('drop', function(e){
  e.preventDefault();
  var f = e.dataTransfer.files[0];
  if(f && f.type==='application/pdf') loadPDF(f);
});

/* ── Load PDF ── */
async function loadPDF(file){
  if(typeof pdfjsLib==='undefined'){ toast('⚠ PDF.js読み込みエラー'); return; }
  if(isLoading) return; /* FIX: prevent concurrent loads */
  isLoading = true;

  /* Reset UI to loading state */
  closePopup();
  G('emptyEl').classList.add('gone');
  G('pdfView').classList.add('gone');
  G('txtView').classList.remove('on');
  G('loading').classList.add('on');
  G('loadMsg').textContent = 'PDF読み込み中...';
  setStatus('読み込み中...', false);

  /* FIX: Cancel any in-progress canvas render */
  if(canvasRenderTask){
    try{ canvasRenderTask.cancel(); }catch(e){}
    canvasRenderTask = null;
  }

  try{
    var ab = await file.arrayBuffer();
    var doc = await pdfjsLib.getDocument({
      data: ab,
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@'+VER+'/cmaps/',
      cMapPacked: true,
      standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@'+VER+'/standard_fonts/'
    }).promise;

    /* FIX: reject empty/corrupt PDFs before doing any work */
    if(!doc.numPages || doc.numPages < 1) throw new Error('このPDFにはページがありません');

    pdfDoc   = doc;
    totalPg  = doc.numPages;
    curPage  = 1;
    allText  = {};

    /* FIX: Compute auto-fit scale using WINDOW dimensions (pdfView is hidden at this point,
       so clientWidth would return 0 — never use hidden element dimensions for layout math) */
    var firstPage = await doc.getPage(1);
    var vp0       = firstPage.getViewport({scale:1.0});
    var sidebarW  = (window.innerWidth > 480) ? 274 : 0;
    var availW    = window.innerWidth - sidebarW - 48; /* 24px padding each side */
    scale = Math.max(Math.min(availW / vp0.width, 1.8), 0.3);

    /* Update sidebar info */
    G('fName').textContent  = file.name;
    G('fPages').textContent = totalPg + 'p';
    G('fInfo').classList.add('on');
    upBox.style.display = 'none';
    G('pgDisp').textContent = '1 / ' + totalPg;
    G('btnPrev').disabled = true;
    G('btnNext').disabled = (totalPg <= 1);

    /* Extract all text for text-mode */
    G('loadMsg').textContent = 'テキスト抽出中...';
    await extractText();

    /* Parse fill-in-blank problems */
    pdfProblems = parsePDFProblems();
    if(pdfProblems.length > 0){
      if(geminiKey){
        G('loadMsg').textContent = 'AI解析中 (Gemini)...';
        try{
          await solveWithGemini(pdfProblems);
          toast('🤖 '+pdfProblems.length+'問をAI解析しました');
        }catch(e){
          toast('⚠ AI解析失敗: '+e.message);
          console.warn('[Gemini]', e);
        }
      } else {
        toast('📝 '+pdfProblems.length+'問を検出 — ⚙設定でGemini APIキーを入力すると自動採点できます');
      }
    }

    G('loading').classList.remove('on');

    /* FIX: Show PDF view BEFORE rendering so canvas is in the DOM and visible */
    showPDFMode();
    await renderPage(curPage);
    renderTextView();

    setStatus(totalPg + 'ページ読み込み完了 ✓ 単語をクリックして意味を確認', true);
    toast('✅ ' + file.name + ' を読み込みました');

  }catch(err){
    pdfDoc = null;
    G('loading').classList.remove('on');
    G('emptyEl').classList.remove('gone');

    /* FIX: Restore upload UI so user can try again */
    upBox.style.display   = '';
    G('fInfo').classList.remove('on');

    setStatus('読み込み失敗', false);
    toast('⚠ 読み込み失敗: ' + (err.message||err));
    console.error('[loadPDF]', err);

  }finally{
    isLoading = false;
  }
}

/* ── Extract text from every page (for text-mode) ── */
async function extractText(){
  for(var p = 1; p <= totalPg; p++){
    try{
      var page = await pdfDoc.getPage(p);
      var tc   = await page.getTextContent({includeMarkedContent:false});
      allText[p] = tc.items
        .filter(function(it){ return typeof it.str === 'string'; })
        .map(function(it){ return it.str + (it.hasEOL ? '\n' : ''); })
        .join('');
    }catch(e){ allText[p] = ''; }
  }
}

/* ── Render PDF canvas + text layer ── */
async function renderPage(pageNum){
  if(!pdfDoc) return;

  /* FIX: Cancel previous canvas render to prevent out-of-order frames */
  if(canvasRenderTask){
    try{ canvasRenderTask.cancel(); }catch(e){}
    canvasRenderTask = null;
  }

  /* FIX: Update nav controls BEFORE the async render so they are never stale
     if the render is cancelled mid-flight (e.g. rapid page flipping) */
  G('pgDisp').textContent = pageNum + ' / ' + totalPg;
  G('zmVal').textContent  = Math.round(scale * 100) + '%';
  G('btnPrev').disabled   = (pageNum <= 1);
  G('btnNext').disabled   = (pageNum >= totalPg);

  var page   = await pdfDoc.getPage(pageNum);
  var vp     = page.getViewport({scale: scale});
  var canvas = G('pdfCanvas');
  var ctx    = canvas.getContext('2d');

  canvas.width  = vp.width;
  canvas.height = vp.height;

  canvasRenderTask = page.render({canvasContext: ctx, viewport: vp});
  try{
    await canvasRenderTask.promise;
  }catch(e){
    /* RenderingCancelledException is expected when we cancel — ignore it */
    if(e && e.name !== 'RenderingCancelledException') console.warn('[render]', e);
    return;
  }
  canvasRenderTask = null;

  /* Render text layer for word selection */
  var tl = G('txtLayer');
  tl.innerHTML = '';
  tl.style.width  = vp.width  + 'px';
  tl.style.height = vp.height + 'px';
  try{
    var tc   = await page.getTextContent({includeMarkedContent:false});
    var task = pdfjsLib.renderTextLayer({
      textContentSource: tc,
      container: tl,
      viewport: vp,
      textDivs: []
    });
    /* FIX: handle both {promise} object (PDF.js 3.x) and bare Promise */
    if(task && task.promise) await task.promise;
    else if(task && typeof task.then === 'function') await task;
  }catch(e){
    if(e && e.name !== 'RenderingCancelledException') console.warn('[textLayer]', e);
  }

  /* zmVal is updated at top of renderPage; pgDisp/buttons also updated there.
     Re-sync zmVal here in case scale changed between start and end of render. */
  G('zmVal').textContent = Math.round(scale * 100) + '%';
}

/* ── Build text-mode view with clickable word tokens ── */
function renderTextView(){
  var view = G('txtView');
  view.innerHTML = '';
  for(var p = 1; p <= totalPg; p++){
    var lbl = document.createElement('div');
    lbl.className   = 'pg-lbl';
    lbl.textContent = 'PAGE ' + p;
    view.appendChild(lbl);

    var text = allText[p] || '';
    if(!text.trim()){
      var nd = document.createElement('div');
      nd.className   = 'no-txt';
      nd.textContent = '(テキストなし)';
      view.appendChild(nd);
      continue;
    }
    var body = document.createElement('div');
    body.className = 'txt-body';
    body.appendChild(makeTokens(text));
    view.appendChild(body);
  }
}

/* FIX: makeTokens — normalise words (strip possessive 's) for correct dict lookup */
function makeTokens(text){
  var frag = document.createDocumentFragment();
  var re   = /([a-zA-Z]{2,}(?:[''][a-zA-Z]+)?)/g;
  var last = 0, m;
  while((m = re.exec(text)) !== null){
    if(m.index > last)
      frag.appendChild(document.createTextNode(text.slice(last, m.index)));

    var raw = m[1];
    var wl  = normalizeWord(raw); /* strip 's, lowercase */
    if(wl.length >= 2){
      var span = document.createElement('span');
      span.className  = 'tok';
      span.textContent = raw;
      span.dataset.word = wl;
      if(vocab.some(function(v){ return v.word === wl; })) span.classList.add('saved');
      (function(w, el){
        el.addEventListener('click', function(e){
          e.stopPropagation();
          openPopup(w, e);
        });
      })(wl, span);
      frag.appendChild(span);
    } else {
      frag.appendChild(document.createTextNode(raw));
    }
    last = m.index + raw.length;
  }
  if(last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

/* ── Word selection in PDF mode via browser text selection ── */
document.addEventListener('mouseup', function(e){
  if(!pdfDoc || viewMode !== 'pdf') return;
  if(G('popup').contains(e.target)) return;
  setTimeout(function(){
    var sel = window.getSelection();
    if(!sel || sel.rangeCount === 0) return;
    var raw = sel.toString().trim();
    var m   = raw.match(/[a-zA-Z]{2,}/);
    if(!m) return;
    var word = normalizeWord(m[0]); /* FIX: strip possessive 's */
    if(word.length < 2) return;
    openPopup(word, e);
  }, 20);
});

document.addEventListener('touchend', function(e){
  if(!pdfDoc || viewMode !== 'pdf') return;
  if(G('popup').contains(e.target)) return;
  var touch = e.changedTouches[0];
  setTimeout(function(){
    var sel = window.getSelection();
    if(!sel) return;
    var raw = sel.toString().trim();
    var m   = raw.match(/[a-zA-Z]{2,}/);
    if(!m) return;
    var word = normalizeWord(m[0]);
    if(word.length < 2) return;
    openPopup(word, {clientX: touch.clientX, clientY: touch.clientY});
  }, 80);
});

/* ── Popup ── */
function closePopup(){ G('popup').classList.remove('on'); }

async function openPopup(word, evt){
  if(!word || word.length < 2) return;
  popupOpenTs = Date.now();

  /* Show loading state immediately */
  G('popBody').innerHTML =
    '<div class="pop-word">'+esc(word)+'</div>'+
    '<div class="pop-loading">'+
      '<div class="spin" style="width:14px;height:14px;border-width:1.5px"></div>'+
      '調べています...'+
    '</div>';
  G('popup').classList.add('on');
  posPopup(evt, true); /* quick initial position */

  try{
    var data = await fetchDef(word);
    buildPopup(word, data, evt);
  }catch(err){
    G('popBody').innerHTML =
      '<div class="pop-word">'+esc(word)+'</div>'+
      '<div class="pop-404">❌ 意味が見つかりませんでした'+
        '<br><span style="font-size:10px">英単語以外または辞書にない語</span>'+
      '</div>';
    /* FIX: reposition after content change */
    setTimeout(function(){ posPopup(evt, false); }, 0);
  }
}

async function fetchDef(word){
  var res = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
  if(!res.ok) throw new Error('not found');
  var json = await res.json();
  if(!Array.isArray(json) || !json.length) throw new Error('empty');
  return json[0];
}

function buildPopup(word, data, evt){
  var isSaved = vocab.some(function(v){ return v.word === word; });
  var html = '';

  html += '<div class="pop-word">'+esc(data.word || word)+'</div>';

  var phon = data.phonetic ||
    (data.phonetics||[]).filter(function(p){ return p.text; }).map(function(p){ return p.text; })[0] || '';
  if(phon) html += '<div class="pop-phon">'+esc(phon)+'</div>';

  (data.meanings||[]).slice(0,3).forEach(function(m, i){
    if(i > 0) html += '<div class="pop-div"></div>';
    html += '<div class="pop-pos">'+esc(m.partOfSpeech||'')+'</div>';
    (m.definitions||[]).slice(0,2).forEach(function(d, di){
      html += '<div class="pop-def">'+(di+1)+'. '+esc(d.definition||'')+'</div>';
      if(d.example) html += '<div class="pop-ex">"'+esc(d.example)+'"</div>';
    });
    if((m.synonyms||[]).length > 0){
      html += '<div class="pop-syn">類義語: <strong>'+
        m.synonyms.slice(0,4).map(esc).join(', ')+'</strong></div>';
    }
  });

  html += '<div class="pop-actions">';
  if(isSaved){
    html += '<button class="pop-btn done">✓ 保存済み</button>';
  } else {
    html += '<button class="pop-btn pri" id="popSave">＋ 単語帳に保存</button>';
  }
  html += '</div>';

  G('popBody').innerHTML = html;

  /* FIX: use setTimeout so browser has laid out the new content before measuring offsetHeight */
  setTimeout(function(){ posPopup(evt, false); }, 0);

  var saveBtn = G('popSave');
  if(saveBtn){
    saveBtn.addEventListener('click', function(){
      saveVocab(word, data);
      saveBtn.className   = 'pop-btn done';
      saveBtn.textContent = '✓ 保存済み';
    });
  }
}

/* FIX: posPopup uses offsetHeight (actual rendered height) not scrollHeight
   (which ignores max-height and returns the full unconstrained content height) */
function posPopup(evt, quick){
  var popup = G('popup');
  var pw = popup.offsetWidth  || 320;
  var ph = quick ? 120 : (popup.offsetHeight || 220);
  var x  = evt.clientX;
  var y  = evt.clientY;
  if(x + pw + 14 > window.innerWidth)  x = window.innerWidth - pw - 14;
  if(x < 8) x = 8;
  y = (y + ph + 20 > window.innerHeight) ? y - ph - 8 : y + 16;
  if(y < 8) y = 8;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

G('popClose').addEventListener('click', closePopup);

/* Close when clicking outside — guarded by timestamp to prevent immediate close */
document.addEventListener('click', function(e){
  if(Date.now() - popupOpenTs < 200) return;
  var popup = G('popup');
  if(popup.classList.contains('on') && !popup.contains(e.target)) closePopup();
});
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closePopup(); });

/* ── Save word to vocabulary ── */
function saveVocab(word, data){
  if(vocab.some(function(v){ return v.word === word; })) return;
  var m    = (data.meanings||[])[0] || {};
  var d    = (m.definitions||[])[0] || {};
  var phon = data.phonetic ||
    (data.phonetics||[]).filter(function(p){ return p.text; }).map(function(p){ return p.text; })[0] || '';
  vocab.unshift({ word:word, phonetic:phon, pos:m.partOfSpeech||'', definition:d.definition||'' });
  /* FIX: catch QuotaExceededError — localStorage can be full on some browsers */
  try{ localStorage.setItem('eng_vocab', JSON.stringify(vocab)); }
  catch(e){ toast('⚠ 単語帳の保存に失敗しました（ストレージ容量不足）'); vocab.shift(); return; }
  /* Mark all matching tokens in text view */
  document.querySelectorAll('.tok').forEach(function(el){
    if(el.dataset.word === word) el.classList.add('saved');
  });
  renderVocab();
  updateVBadge();
  toast('💾 "'+word+'" を単語帳に保存しました');
}

/* ── Vocab list ── */
function renderVocab(){
  var list  = G('vList');
  var empty = G('vEmpty');
  if(!vocab.length){ empty.style.display=''; list.innerHTML=''; return; }
  empty.style.display = 'none';
  list.innerHTML = '';
  vocab.forEach(function(v){
    var div = document.createElement('div');
    div.className = 'v-item';
    div.innerHTML =
      '<div class="v-word">'+esc(v.word)+'</div>'+
      (v.phonetic  ? '<div class="v-phon">'+esc(v.phonetic)+'</div>'  : '')+
      (v.pos       ? '<span class="v-pos">'+esc(v.pos)+'</span>'      : '')+
      (v.definition? '<div class="v-def">'+esc(v.definition)+'</div>' : '');
    (function(vv){
      div.addEventListener('click', function(){
        openPopup(vv.word, {clientX: window.innerWidth/2, clientY: window.innerHeight/2});
      });
    })(v);
    list.appendChild(div);
  });
}
function updateVBadge(){ G('vbadge').textContent = '単語帳 ' + vocab.length; }

G('vbadge').addEventListener('click', function(){ G('vList').scrollIntoView({behavior:'smooth'}); });
G('vClear').addEventListener('click', function(){
  if(!vocab.length) return;
  if(!confirm('単語帳をクリアしますか?')) return;
  vocab = [];
  try{ localStorage.setItem('eng_vocab', '[]'); }catch(e){}
  document.querySelectorAll('.tok.saved').forEach(function(el){ el.classList.remove('saved'); });
  renderVocab();
  updateVBadge();
  toast('単語帳をクリアしました');
});

});
G('btnNext').addEventListener('click', function(){
  if(!pdfDoc || curPage >= totalPg) return;
  curPage++;

});
document.addEventListener('keydown', function(e){
  if(!pdfDoc || viewMode !== 'pdf') return;
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){
    if(curPage < totalPg){ curPage++; renderPage(curPage); }
  } else if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
    if(curPage > 1){ curPage--; renderPage(curPage); }
  }
});

/* ── Zoom ── */
G('btnZin').addEventListener('click', function(){
  if(!pdfDoc) return; /* FIX: guard against no PDF */
  scale = Math.min(scale * 1.2, 3.0);
  renderPage(curPage);
});
G('btnZout').addEventListener('click', function(){
  if(!pdfDoc) return;
  scale = Math.max(scale / 1.2, 0.3);

});
G('btnZfit').addEventListener('click', function(){
  if(!pdfDoc) return;
  /* FIX: Use window dimensions (not pdfView.clientWidth) for accurate fit calculation */
  pdfDoc.getPage(curPage).then(function(page){
    var vp0      = page.getViewport({scale:1.0});
    var sidebarW = (window.innerWidth > 480) ? 274 : 0;
    var availW   = window.innerWidth - sidebarW - 48;
    scale = Math.max(Math.min(availW / vp0.width, 1.8), 0.3);
    renderPage(curPage);
  });
});

/* ── PDF PROBLEM PARSER ── */
function parsePDFProblems(){
  var text = Object.keys(allText).sort(function(a,b){ return a-b; })
    .map(function(k){ return allText[k]; }).join('\n');
  /* normalize blanks: （ ）→( ) */
  text = text.replace(/[（(]\s*[）)]/g, '( )').replace(/（[　\s]+）/g, '( )');
  var lines = text.split(/\n/).map(function(l){ return l.trim(); });
  var problems = [];
  for(var i=0; i<lines.length; ){
    var qm = lines[i].match(/^[（(](\d+)[）)]\s+(.*)/);
    if(qm && parseInt(qm[1]) === problems.length+1){
      var qText = qm[2], num = parseInt(qm[1]);
      i++;
      for(; i<lines.length; i++){
        var l = lines[i];
        /* choice line: "1 word 2 word 3 word 4 word" with any spacing */
        var cm = l.match(/^1[\s　]+(\S+)[\s　]+2[\s　]+(\S+)[\s　]+3[\s　]+(\S+)[\s　]+4[\s　]+(\S+)/);
        if(cm){
          problems.push({num:num, text:qText.replace(/\s+/g,' ').trim(),
            choices:[cm[1],cm[2],cm[3],cm[4]], correctIdx:-1});
          i++; break;
        }
        if(l.match(/^[（(]\d+[）)]/)) break; /* next Q starts */
        if(l) qText += ' '+l;
      }
    } else { i++; }
  }
  return problems;
}

/* ── GEMINI API ── */
async function solveWithGemini(problems){
  var prompt = '以下の英語穴埋め問題を解き、全問の正解番号をカンマ区切りで返してください。番号のみ（例: 2,1,4,3,1,4）\n\n';
  problems.forEach(function(p,i){
    prompt += '('+(i+1)+') '+p.text+'\n';
    p.choices.forEach(function(c,j){ prompt += (j+1)+' '+c+'  '; });
    prompt += '\n\n';
  });
  var res = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+encodeURIComponent(geminiKey),
    {method:'POST', headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})}
  );
  if(!res.ok){
    var e = await res.json().catch(function(){ return {}; });
    throw new Error((e.error&&e.error.message)||('HTTP '+res.status));
  }
  var json = await res.json();
  var txt = json.candidates[0].content.parts[0].text.trim();
  var nums = txt.match(/[1-4]/g);
  if(nums && nums.length === problems.length){
    nums.forEach(function(n,i){ problems[i].correctIdx = parseInt(n)-1; });
  } else {
    throw new Error('応答を解析できませんでした: '+txt.slice(0,40));
  }
}

/* ── QUIZ ── */
var quizQuestions = [];
var quizAnswers   = [];   /* -1 = unanswered */
var quizIdx       = 0;
var quizChecked   = false;

function quizShuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  return arr;
}
function buildQuizQuestions(){
  var valid=vocab.filter(function(v){ return v.definition; });
  if(valid.length<4) return [];
  var pool=quizShuffle(valid.slice());
  return pool.map(function(item){
    var others=quizShuffle(pool.filter(function(x){ return x.word!==item.word; }));
    var choices=quizShuffle(others.slice(0,3).map(function(x){ return x.definition; }).concat([item.definition]));
    return {word:item.word, phonetic:item.phonetic||'', correct:item.definition,
            choices:choices, correctIdx:choices.indexOf(item.definition)};
  });
}
function startQuiz(){
  /* PDF問題があればそちらを使う */
  if(pdfProblems.length > 0){
    quizQuestions = pdfProblems.map(function(p){
      return {text:p.text, choices:p.choices, correctIdx:p.correctIdx};
    });
    quizAnswers = quizQuestions.map(function(){ return -1; });
    quizIdx=0; quizChecked=false;
    renderQuizQ();
    return;
  }
  /* 単語帳クイズ */
  var valid=vocab.filter(function(v){ return v.definition; });
  if(valid.length<4){
    G('quizInner').innerHTML=
      '<div class="quiz-empty">単語帳に<strong style="color:var(--acc)">4つ以上</strong>の単語を<br>保存してからクイズを始めましょう<br><br>'+
      '<span style="font-size:11px">現在: '+vocab.length+'語</span></div>';
    return;
  }
  quizQuestions=buildQuizQuestions();
  quizAnswers=quizQuestions.map(function(){ return -1; });
  quizIdx=0; quizChecked=false;
  renderQuizQ();
}
function renderQuizQ(){
  var q=quizQuestions[quizIdx], total=quizQuestions.length;
  var userAns=quizAnswers[quizIdx];
  var doneCount=quizAnswers.filter(function(a){ return a!==-1; }).length;
  var allDone=(doneCount===total);

  /* progress dots */
  var progHtml=quizQuestions.map(function(qi,i){
    var a=quizAnswers[i];
    var cls='qprog-dot', sub='';
    if(quizChecked){
      var ok=(a===quizQuestions[i].correctIdx);
      cls+=(ok?' qprog-ok':' qprog-ng');
      sub='<span class="qprog-sub">'+(ok?'○':'✕')+'</span>';
    } else if(a!==-1){
      cls+=' qprog-ans';
    }
    if(i===quizIdx) cls+=' qprog-cur';
    return '<span class="'+cls+'" data-qi="'+i+'">('+( i+1 )+')'+sub+'</span>';
  }).join('');

  /* choices */
  var choicesHtml=q.choices.map(function(c,i){
    var cls='choice-btn', badge='', disabled='';
    if(quizChecked){
      disabled='disabled';
      if(i===q.correctIdx){
        cls+=' correct';
        badge='<span class="choice-mark">○</span>';
      } else if(i===userAns){
        cls+=' wrong';
        badge='<span class="choice-mark">✕</span>';
      }
    } else {
      if(i===userAns) cls+=' selected';
    }
    return '<button class="'+cls+'" data-cidx="'+i+'" '+disabled+'>'+badge+esc(c)+'</button>';
  }).join('');

  /* result under question number */
  var qResult='';
  if(quizChecked && userAns!==-1){
    qResult='<span class="quiz-q-result">'+(userAns===q.correctIdx?'○':'✕')+'</span>';
  }

  /* score (shown during review) */
  var scoreHtml='';
  if(quizChecked){
    var score=quizAnswers.filter(function(a,i){ return a===quizQuestions[i].correctIdx; }).length;
    scoreHtml=
      '<div class="quiz-score-row">'+score+' / '+total+'</div>'+
      '<div class="quiz-score-sub">正解率 '+Math.round(score/total*100)+'%</div>';
  }

  /* PDF問題（文章）か単語帳問題かで表示を切り替える */
  var qMainHtml, qMainCls, qLbl;
  if(q.text){
    qMainHtml = esc(q.text).replace(/\( \)/g, '<span class="quiz-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    qMainCls  = 'quiz-q-sentence';
    qLbl      = '（　）に入れる最も適切な語を選んでください';
  } else {
    qMainHtml = esc(q.word||'');
    qMainCls  = 'quiz-q-word';
    qLbl      = 'この単語の意味は？';
  }

  G('quizInner').innerHTML=
    '<div class="qprog-wrap">'+progHtml+'</div>'+
    '<div class="quiz-q-area">'+
      '<div class="quiz-q-num"><span>('+(quizIdx+1)+')</span>'+qResult+'</div>'+
      '<div class="quiz-q-lbl">'+qLbl+'</div>'+
      '<div class="'+qMainCls+'">'+qMainHtml+'</div>'+
      (q.phonetic?'<div class="quiz-q-phon">'+esc(q.phonetic)+'</div>':'')+
    '</div>'+
    '<div class="quiz-choices">'+choicesHtml+'</div>'+
    scoreHtml+
    '<div class="quiz-bottom">'+
      '<div class="quiz-nav">'+
        '<button class="quiz-nav-btn" id="quizPrevBtn"'+(quizIdx===0?' disabled':'')+'>◀</button>'+
        '<span class="quiz-nav-cnt">'+doneCount+' / '+total+' 回答済み</span>'+
        '<button class="quiz-nav-btn" id="quizNextBtn"'+(quizIdx>=total-1?' disabled':'')+'>▶</button>'+
      '</div>'+
      (quizChecked?
        '<button class="quiz-restart-btn" id="quizRestartBtn">もう一度</button>'
      :
        '<button class="quiz-check-btn'+(allDone?'':' off')+'" id="quizCheckBtn">答え合わせ</button>'
      )+
    '</div>';

  /* events */
  if(!quizChecked){
    G('quizInner').querySelectorAll('.choice-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        quizSelect(parseInt(btn.dataset.cidx,10));
      });
    });
    var cb=G('quizCheckBtn');
    if(cb && allDone) cb.addEventListener('click',quizDoCheck);
  }
  G('quizInner').querySelectorAll('.qprog-dot').forEach(function(dot){
    dot.addEventListener('click',function(){ quizIdx=parseInt(dot.dataset.qi,10); renderQuizQ(); });
  });
  var pb=G('quizPrevBtn'), nb=G('quizNextBtn');
  if(pb) pb.addEventListener('click',function(){ quizIdx--; renderQuizQ(); });
  if(nb) nb.addEventListener('click',function(){ quizIdx++; renderQuizQ(); });
  var rb=G('quizRestartBtn');
  if(rb) rb.addEventListener('click',startQuiz);
}
function quizSelect(idx){
  if(quizChecked) return;
  quizAnswers[quizIdx]=idx;
  renderQuizQ();
  /* auto-advance to next unanswered */
  var next=-1;
  for(var i=quizIdx+1;i<quizQuestions.length;i++){
    if(quizAnswers[i]===-1){ next=i; break; }
  }
  if(next===-1){
    for(var k=0;k<quizIdx;k++){
      if(quizAnswers[k]===-1){ next=k; break; }
    }
  }
  if(next!==-1){
    setTimeout(function(){ quizIdx=next; renderQuizQ(); },280);
  }
}
function quizDoCheck(){
  /* PDF問題で正解が不明（APIキー未設定など）の場合 */
  var hasUnknown = quizQuestions.some(function(q){ return q.correctIdx===-1; });
  if(hasUnknown){
    G('quizInner').innerHTML=
      '<div class="quiz-empty">自動採点にはGemini APIキーが必要です<br><br>'+
      '<button class="quiz-check-btn" id="openSettingsBtn" style="display:inline-block;width:auto;padding:10px 24px">⚙ 設定を開く</button>'+
      '<br><br><span style="font-size:11px">設定後、PDFを再読み込みしてください</span></div>';
    G('openSettingsBtn').addEventListener('click',function(){
      G('geminiKeyInput').value=geminiKey;
      G('settingsStatus').className='settings-status';
      G('settingsOverlay').classList.add('on');
    });
    return;
  }
  quizChecked=true; quizIdx=0;
  renderQuizQ();
}
function showQuizMode(){
  viewMode='quiz';
  G('btnQuiz').classList.add('on');
  G('btnPDF').classList.remove('on'); G('btnTxt').classList.remove('on');
  G('pdfView').classList.add('gone');
  G('txtView').classList.remove('on');
  G('quizView').classList.add('on');
  closePopup();
  startQuiz();
}
G('btnQuiz').addEventListener('click', showQuizMode);

/* ── Init ── */
renderVocab();
updateVBadge();

})();
</script>
